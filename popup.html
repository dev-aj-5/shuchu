<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --glass-bg: rgba(36, 36, 39, 0.96); 
      --glass-border: rgba(255, 255, 255, 0.05);
      --text-main: rgba(255, 255, 255, 0.95);
      --text-muted: rgba(255, 255, 255, 0.45);
      --accent-pill: rgba(255, 255, 255, 0.06);
      --accent-pill-hover: rgba(255, 255, 255, 0.12);
    }
    
    html, body {
      background: #1e1e20;
      margin: 0;
      padding: 0;
      width: 280px;
      box-sizing: border-box;
      overflow: hidden;
    }

    .window-frame {
      background: var(--glass-bg);
      padding: 24px 20px;
      box-sizing: border-box;
      width: 100%;
    }

    h3 {
      font-family: 'Times New Roman', Times, Georgia, Cambria, serif;
      margin: 0 0 4px 0;
      font-size: 24px;
      font-weight: 400;
      text-align: center;
      color: #ffffff;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 24px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    #interactive-inputs {
      max-height: 120px;
      opacity: 1;
      transform: translateY(0);
      transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      overflow: hidden;
    }

    #interactive-inputs.hidden {
      max-height: 0;
      opacity: 0;
      transform: translateY(-10px);
      margin-bottom: 0;
    }

    .btn-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    button.preset-btn {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 12px 8px;
      border: 1px solid var(--glass-border);
      background: var(--accent-pill);
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-main);
      transition: all 0.2s ease;
    }

    button.preset-btn:hover {
      background: var(--accent-pill-hover);
      border-color: rgba(255, 255, 255, 0.15);
    }

    button.preset-btn.selected {
      background: #ffffff;
      color: #1c1c1e;
      border-color: #ffffff;
      font-weight: 600;
    }

    .custom-container {
      margin-bottom: 20px;
    }

    input {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      font-size: 13px;
      background: var(--accent-pill);
      color: var(--text-main);
      outline: none;
      transition: all 0.2s ease;
      text-align: center;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }

    input:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.25);
    }

    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button {
      filter: invert(1);
    }

    .status-container {
      text-align: center;
      margin-bottom: 12px;
      min-height: 44px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .status {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: -0.1px;
      transition: color 0.2s ease, opacity 0.2s ease;
      width: 100%;
    }

    /* Isolated, animated warning layout architecture */
    .warning-message {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: #ff8787;
      letter-spacing: -0.1px;
      opacity: 0;
      transform: translateY(4px);
      transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
      margin-top: 4px;
      height: 0;
      overflow: hidden;
    }

    .warning-message.visible {
      opacity: 1;
      transform: translateY(0);
      height: 16px;
    }

    .countdown {
      font-family: 'Times New Roman', Times, Georgia, serif;
      font-size: 46px;
      font-weight: 400;
      color: #ffffff;
      margin-top: 4px;
      height: 0;
      opacity: 0;
      transform: scale(0.95);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      overflow: hidden;
    }

    .countdown.visible {
      height: 54px;
      opacity: 1;
      transform: scale(1);
    }

    .action-btn {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
      letter-spacing: -0.2px;
      box-sizing: border-box;
    }

    .start {
      background: #ffffff;
      color: #19191b;
    }

    .start:hover {
      background: rgba(255, 255, 255, 0.9);
    }

    .stop {
      background: rgba(239, 68, 68, 0.25);
      color: #ffc9c9;
      border: 1px solid rgba(239, 68, 68, 0.35);
    }

    .stop:hover {
      background: rgba(239, 68, 68, 0.35);
    }
  </style>
</head>
<body>
  <div class="window-frame">
    <h3>Shūchū</h3>
    <div class="subtitle">Focus Flow</div>
    
    <div id="interactive-inputs">
      <div class="btn-grid">
        <button class="preset-btn" data-mins="5">5m</button>
        <button class="preset-btn" data-mins="10">10m</button>
        <button class="preset-btn" data-mins="15">15m</button>
      </div>
      <div class="custom-container">
        <input type="number" id="custom-time" placeholder="Custom duration (minutes)" min="1">
      </div>
    </div>
    
    <div class="status-container">
      <div class="status" id="status-text">Select focus depth</div>
      <div id="warning-text" class="warning-message">Please select a focus window</div>
      <div class="countdown" id="countdown-display">00:00</div>
    </div>
    
    <button id="toggle-btn" class="action-btn start">Start Focus</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
