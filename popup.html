<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #f9f9fb 0%, #f1f1f4 100%);
      --text-main: #191919;
      --text-muted: #666666;
      --border-color: #e2e2e7;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 250px;
      padding: 20px;
      margin: 0;
      background: var(--bg-gradient);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
    }

    h3 {
      font-family: Georgia, Cambria, "Times New Roman", Times, serif;
      margin: 0 0 16px 0;
      font-size: 20px;
      font-weight: 500;
      text-align: center;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 20px;
    }

    .btn-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    button.preset-btn {
      padding: 8px;
      border: 1px solid var(--border-color);
      background: #ffffff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-main);
      transition: all 0.2s ease;
    }

    button.preset-btn:hover {
      background: #f5f5f7;
      border-color: #d1d1d6;
    }

    button.preset-btn.selected {
      background: #191919;
      color: #ffffff;
      border-color: #191919;
    }

    .custom-container {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      font-size: 13px;
      background: #ffffff;
      outline: none;
      transition: border-color 0.2s ease;
    }

    input:focus {
      border-color: #191919;
    }

    .status-container {
      text-align: center;
      margin-bottom: 16px;
      min-height: 24px;
    }

    .status {
      font-size: 13px;
      color: var(--text-muted);
    }

    .countdown {
      font-family: Georgia, serif;
      font-size: 28px;
      font-weight: bold;
      color: #191919;
      margin-top: 4px;
      display: none;
    }

    .action-btn {
      width: 100%;
      padding: 12px;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .start {
      background: #191919;
    }

    .start:hover {
      background: #333333;
    }

    .stop {
      background: #e03131;
    }

    .stop:hover {
      background: #c92a2a;
    }
  </style>
</head>
<body>
  <h3>Shūchū</h3>
  <div class="subtitle">Focus Flow Dashboard</div>
  
  <div id="interactive-inputs">
    <div class="btn-grid">
      <button class="preset-btn" data-mins="5">5m</button>
      <button class="preset-btn" data-mins="10">10m</button>
      <button class="preset-btn" data-mins="15">15m</button>
    </div>
    <div class="custom-container">
      <input type="number" id="custom-time" placeholder="Custom duration (minutes)" min="1">
    </div>
  </div>
  
  <div class="status-container">
    <div class="status" id="status-text">Select focus depth</div>
    <div class="countdown" id="countdown-display">00:00</div>
  </div>
  
  <button id="toggle-btn" class="action-btn start">Start Focus</button>

  <script src="popup.js"></script>
</body>
</html>
