<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; width: 220px; padding: 12px; margin: 0; background: #fafafa; color: #333; }
    h3 { margin-top: 0; font-size: 16px; text-align: center; }
    .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 8px; }
    button { padding: 6px; border: 1px solid #ccc; background: white; border-radius: 4px; cursor: pointer; font-size: 12px; }
    button:hover { background: #f0f0f0; }
    .custom-input { display: flex; gap: 4px; margin-bottom: 12px; }
    input { width: 100%; padding: 4px; border: 1px solid #ccc; border-radius: 4px; }
    .status { text-align: center; font-weight: bold; margin-bottom: 8px; font-size: 13px; }
    .action-btn { width: 100%; padding: 8px; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
    .start { background: #00875A; }
    .stop { background: #DE350B; display: none; }
  </style>
</head>
<body>
  <h3>Focus Flow</h3>
  <div id="timer-section">
    <div class="btn-grid">
      <button data-mins="5">5m</button>
      <button data-mins="10">10m</button>
      <button data-mins="15">15m</button>
    </div>
    <div class="custom-input">
      <input type="number" id="custom-time" placeholder="Custom mins" min="1">
    </div>
  </div>
  
  <div class="status" id="status-text">Ready to focus</div>
  <button id="toggle-btn" class="action-btn start">Start Focus</button>

  <script src="popup.js"></script>
</body>
</html>
